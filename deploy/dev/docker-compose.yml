## Dev stack: relay server + Grafana LGTM observability.
##
## Usage:
##   make dev-up         # build & start everything
##   make dev-down       # stop everything
##   make dev-logs       # tail relay logs
##
## Relay:     http://localhost:8787  (health, WebSocket, /metrics)
## Grafana:   http://localhost:3000  (no login required)

services:
  relay:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    environment:
      - OTEL_SERVICE_NAME=massrelay-dev
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://lgtm:4318
      - OTEL_METRICS_PROMETHEUS=true
      - RELAY_LOG_PAYLOADS=${RELAY_LOG_PAYLOADS:-0}
    depends_on:
      - lgtm
    restart: unless-stopped

  lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
