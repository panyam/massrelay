## Production relay server deployment with Caddy reverse proxy.
##
## Usage:
##   cp .env.example .env   # configure domain, OTEL, etc.
##   docker compose up -d   # start everything
##   docker compose logs -f # tail all logs
##
## Caddy provides:
##   - Auto TLS via Let's Encrypt (just set RELAY_DOMAIN)
##   - WebSocket proxying (wss://your-domain/ws/...)
##   - /metrics and /grafana behind basic auth (TODO)
##
## Ports exposed:
##   80/443  — Caddy (relay + Grafana)

services:
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - RELAY_DOMAIN=${RELAY_DOMAIN:-localhost}
    depends_on:
      - relay

  relay:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: always
    expose:
      - "8787"
    environment:
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-massrelay}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_METRICS_PROMETHEUS=true
      - RELAY_LOG_PAYLOADS=${RELAY_LOG_PAYLOADS:-0}
      - RELAY_ADMIN_TOKEN=${RELAY_ADMIN_TOKEN:-}
      - RELAY_ALLOWED_ORIGINS=${RELAY_ALLOWED_ORIGINS:-}
      - RELAY_TRUSTED_PROXIES=${RELAY_TRUSTED_PROXIES:-}
      - RELAY_MAX_CONNECTIONS=${RELAY_MAX_CONNECTIONS:-500}
      - RELAY_GLOBAL_RATE=${RELAY_GLOBAL_RATE:-100}
      - RELAY_PER_IP_RATE=${RELAY_PER_IP_RATE:-5}
    command: ["-port", "8787"]

volumes:
  caddy_data:
  caddy_config:
