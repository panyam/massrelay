syntax = "proto3";
package excaliframe.v1.services;

option go_package = "github.com/user/excaliframe/relay/gen/go/excaliframe/v1/services";

import "excaliframe/v1/models/collab.proto";

service CollabService {
  // Bidi stream: main real-time connection
  rpc Sync(stream excaliframe.v1.models.CollabAction)
      returns (stream excaliframe.v1.models.CollabEvent);

  // Unary: room info
  rpc GetRoom(excaliframe.v1.models.GetRoomRequest)
      returns (excaliframe.v1.models.GetRoomResponse);

  // Unary: list active rooms
  rpc ListRooms(excaliframe.v1.models.ListRoomsRequest)
      returns (excaliframe.v1.models.ListRoomsResponse);
}
