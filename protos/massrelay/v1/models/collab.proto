syntax = "proto3";
package massrelay.v1.models;

option go_package = "github.com/panyam/massrelay/gen/go/massrelay/v1/models";

// ─── Client → Server ────────────────────────────

message CollabAction {
  string action_id = 1;
  string client_id = 2;
  int64 timestamp = 3;

  oneof action {
    JoinRoom join = 10;
    LeaveRoom leave = 11;
    PresenceUpdate presence = 12;
    // Part 2:
    SceneUpdate scene_update = 13;
    CursorUpdate cursor_update = 14;
    TextUpdate text_update = 15;
    SceneInitRequest scene_init_request = 16;
    SceneInitResponse scene_init_response = 17;
    CredentialsChanged credentials_changed = 18;
    TitleChanged title_changed = 19;
  }
}

message JoinRoom {
  string session_id = 1;      // empty = relay generates one (owner creating new session)
  string username = 2;
  map<string, string> metadata = 3;  // application-defined key-value pairs (e.g. {"tool": "whiteboard", "docType": "design"})
  string client_type = 4;     // "browser" | "api" | "cli"
  string avatar_url = 5;
  bool is_owner = 6;
  string browser_id = 7;      // localStorage UUID for ownership transfer
  string client_hint = 8;     // opaque hint for session reuse (e.g. "userId:documentId")
  int32 protocol_version = 9; // client protocol version (current = 2, legacy implicit = 1)
  bool encrypted = 10;        // owner declares room as encrypted (password-based E2EE)
  string title = 11;          // document/session title (owner sends, relay echoes to joiners)
}

message LeaveRoom {
  string reason = 1;
}

message PresenceUpdate {
  bool is_active = 1;
  string username = 2;
}

// Part 2 messages:
message SceneUpdate {
  repeated ElementUpdate elements = 1;
}

message ElementUpdate {
  string id = 1;
  int32 version = 2;
  int32 version_nonce = 3;
  string data = 4;            // JSON-encoded full element
  bool deleted = 5;
}

message CursorUpdate {
  float x = 1;
  float y = 2;
  string tool = 3;
  string button = 4;
  map<string, bool> selected_element_ids = 5;
}

message TextUpdate {
  string text = 1;
  int32 version = 2;
  int32 cursor_position = 3;
}

message SceneInitRequest {}

// Tool-agnostic response to SceneInitRequest. Payload is a JSON blob
// whose schema is owned by the application's SyncAdapter implementation.
message SceneInitResponse {
  string payload = 1;
}

// ─── Server → Client ────────────────────────────

message CollabEvent {
  string event_id = 1;
  string from_client_id = 2;
  int64 server_timestamp = 3;

  oneof event {
    RoomJoined room_joined = 10;
    PeerJoined peer_joined = 11;
    PeerLeft peer_left = 12;
    PresenceUpdate presence = 13;
    // Part 2:
    SceneUpdate scene_update = 14;
    CursorUpdate cursor_update = 15;
    TextUpdate text_update = 16;
    SceneInitResponse scene_init_response = 17;
    ErrorEvent error = 18;
    SceneInitRequest scene_init_request = 19;
    SessionEnded session_ended = 20;
    OwnerChanged owner_changed = 21;
    CredentialsChanged credentials_changed = 22;
    TitleChanged title_changed = 23;
  }
}

// Room captures the canonical state of a collaboration session.
// Composed into RoomJoined and GetRoomResponse to avoid field duplication.
message Room {
  string session_id = 1;
  repeated PeerInfo peers = 2;
  string owner_client_id = 3;
  int64 created_at = 4;
  map<string, string> metadata = 5;
  bool encrypted = 6;
  string title = 7;
}

message RoomJoined {
  string client_id = 1;
  Room room = 2;
  int32 max_peers = 5;            // relay's max-peers setting (informational for UI)
  int32 protocol_version = 7;     // relay protocol version
}

message PeerInfo {
  string client_id = 1;
  string username = 2;
  string avatar_url = 3;
  string client_type = 4;
  bool is_active = 5;
  bool is_owner = 6;
  map<string, string> metadata = 7;  // application-defined key-value pairs (from JoinRoom)
}

message PeerJoined {
  PeerInfo peer = 1;
}

message PeerLeft {
  string client_id = 1;
  string reason = 2;
  int32 peer_count = 3;
}

message ErrorEvent {
  string code = 1;
  string message = 2;
}

message SessionEnded {
  string reason = 1;
}

message OwnerChanged {
  string new_owner_client_id = 1;
}

message CredentialsChanged {
  string reason = 1;           // "password_changed" | "password_removed" | "key_rotated"
}

message TitleChanged {
  string title = 1;            // new document/session title
}

// ─── Dashboard / Info ───────────────────────────

message GetRoomRequest {
  string session_id = 1;
}

message GetRoomResponse {
  Room room = 1;
}

message ListRoomsRequest {}

message ListRoomsResponse {
  repeated RoomSummary rooms = 1;
}

message RoomSummary {
  string session_id = 1;
  int32 peer_count = 2;
  int64 created_at = 3;
}
